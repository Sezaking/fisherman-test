<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!-- Mobile display settings: 画質には触らず、表示領域だけ整える -->
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FisherMan3D">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Unity Web Player | FisherMan3D</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      #unity-container {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #000 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      #unity-canvas {
        width: 100vw !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        background: #000 !important;
        display: block !important;
      }

      #unity-loading-bar {
        position: fixed !important;
        left: 50% !important;
        top: 50% !important;
        transform: translate(-50%, -50%) !important;
        z-index: 1000 !important;
      }

      #unity-warning {
        position: fixed !important;
        left: 50% !important;
        top: 5% !important;
        transform: translateX(-50%) !important;
        z-index: 10000 !important;
        max-width: 90vw !important;
      }

      #unity-footer {
        display: none !important;
      }

      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: #000;
        color: #fff;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 24px;
        line-height: 1.5;
        padding: 24px;
        box-sizing: border-box;
      }

      #rotate-hint .rotate-icon {
        font-size: 54px;
        margin-bottom: 16px;
      }

      @media screen and (orientation: portrait) {
        #rotate-hint {
          display: flex;
        }

        #unity-container {
          pointer-events: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">FisherMan3D</div>
      </div>
    </div>

    <div id="rotate-hint">
      <div>
        <div class="rotate-icon">↻</div>
        <div>スマホを横向きにしてください</div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityContainer = document.querySelector("#unity-container");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");

        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == "error") {
          div.style = "background: red; color: black; padding: 10px;";
        } else {
          if (type == "warning") {
            div.style = "background: yellow; color: black; padding: 10px;";
          }

          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      function isMobileDevice() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      }

      function requestMobileFullscreen() {
        var element = document.documentElement;

        if (element.requestFullscreen) {
          element.requestFullscreen().catch(function () {});
        } else if (element.webkitRequestFullscreen) {
          try {
            element.webkitRequestFullscreen();
          } catch (e) {}
        }

        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(function () {});
        }
      }

      if (isMobileDevice()) {
        document.addEventListener(
          "pointerdown",
          function () {
            requestMobileFullscreen();
          },
          { once: true }
        );

        document.addEventListener(
          "touchmove",
          function (event) {
            event.preventDefault();
          },
          { passive: false }
        );
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/FisherManWeb.loader.js";

      var config = {
        arguments: [],
        dataUrl: buildUrl + "/FisherManWeb.data",
        frameworkUrl: buildUrl + "/FisherManWeb.framework.js",
        codeUrl: buildUrl + "/FisherManWeb.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "FisherMan3D",
        productVersion: "0.1.0",
        showBanner: unityShowBanner
      };

      if (isMobileDevice()) {
        unityContainer.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        unityContainer.className = "unity-desktop";
        canvas.className = "unity-desktop";
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          document.querySelector("#unity-progress-bar-full").style.width =
            100 * progress + "%";
        })
          .then(function (unityInstance) {
            document.querySelector("#unity-loading-bar").style.display = "none";

            var fullscreenButton = document.querySelector("#unity-fullscreen-button");
            if (fullscreenButton != null) {
              fullscreenButton.onclick = function () {
                unityInstance.SetFullscreen(1);
              };
            }
          })
          .catch(function (message) {
            alert(message);
          });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
